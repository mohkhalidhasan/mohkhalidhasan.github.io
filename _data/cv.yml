    Selected Publications:
      - title: Channel-Adaptive Privacy Enhancement for NOMA-Based Antagonistic Overlay Cognitive Networks
        authors:
          - "**Moh Khalid Hasan**"
          - Shucheng Yu
          - Min Song
        publisher: IEEE Transactions on Vehicular Technology
        releaseDate: 2026-02
        url: https://doi.org/10.1109/TVT.2025.3606837
        summary: >
          Develops channel-adaptive privacy enhancement for secure spectrum-sharing
          networks under antagonistic conditions.

      - title: U-Net-Based Optical Camera Communication in Intensity-Constrained Scenarios
        authors:
          - Md Osman Ali
          - "**Moh Khalid Hasan**"
          - Yitong Wang
          - Mohamed Shehata
          - Jing Fu
          - Stanley Luong
          - Ke Wang
        publisher: Journal of Lightwave Technology
        releaseDate: 2025-05
        url: https://doi.org/10.1109/JLT.2025.3543281
        summary: >
          Uses a U-Net-based approach to improve optical camera communication
          performance under intensity-constrained conditions.

      - title: Cooperative NOMA-Based Spectrum Leasing With Multiple Secondary Users
        authors:
          - "**Moh Khalid Hasan**"
          - Xiaochan Xue
          - Shucheng Yu
          - Min Song
        publisher: IEEE Transactions on Vehicular Technology
        releaseDate: 2023
        url: https://doi.org/10.1109/TVT.2023.3287230
        summary: >
          Studies cooperative NOMA-based spectrum leasing and resource allocation
          with multiple secondary users.

      - title: Over-the-Air Federated Learning with Enhanced Privacy
        authors:
          - Xiaochan Xue
          - "**Moh Khalid Hasan**"
          - Shucheng Yu
          - Laxima Niure Kandel
          - Min Song
        publisher: IEEE International Conference on Communications
        releaseDate: 2023
        url: https://doi.org/10.1109/ICC45041.2023.10278765
        summary: >
          Presents a privacy-enhanced over-the-air federated learning framework
          for distributed wireless learning.

      - title: Optical Camera Communication in Vehicular Applications — A Review
        authors:
          - "**Moh Khalid Hasan**"
          - Md Osman Ali
          - Md Habibur Rahman
          - Mostafa Zaman Chowdhury
          - Yeong Min Jang
        publisher: IEEE Transactions on Intelligent Transportation Systems
        releaseDate: 2022
        url: https://doi.org/10.1109/TITS.2021.3086409
        summary: >
          Reviews optical camera communication technologies, system models,
          applications, and challenges for intelligent transportation.

      - title: Optical Wireless Hybrid Networks — Trends, Opportunities, Challenges, and Research Directions
        authors:

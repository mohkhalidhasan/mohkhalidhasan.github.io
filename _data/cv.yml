cv:
  name: Moh Khalid Hasan
  label: Assistant Professor of Computer Science
  email: dwtn6r@jmu.edu
  location: Harrisonburg, VA, USA
  website: https://mohkhalidhasan.github.io
  image: ""
  summary: >
    Assistant Professor of Computer Science whose research lies at the intersection
    of wireless communications, cybersecurity, and trustworthy artificial intelligence.
    His work focuses on physical-layer security and privacy, cognitive radio and
    dynamic spectrum sharing, UAV- and RIS-enabled wireless networks, federated
    learning, machine learning for wireless optimization, and optical communication
    systems. He has authored 46 peer-reviewed journal and conference publications
    and actively mentors undergraduate and graduate researchers.


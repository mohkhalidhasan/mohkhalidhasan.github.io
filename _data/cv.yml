    Research Areas:
      - label: Wireless Security and Privacy
        details: Physical-layer security, privacy enhancement, secure NOMA, cognitive radio, and dynamic spectrum sharing.
      - label: Intelligent Wireless Networks
        details: UAV-assisted and RIS-enabled communications, resource allocation, spectrum sharing, and emerging 6G systems.
      - label: Trustworthy Artificial Intelligence
        details: Federated learning, privacy-preserving learning, adversarial machine learning, and machine learning for wireless optimization.
      - label: Optical Communications
        details: Optical camera communication, visible-light communication, hybrid optical/RF systems, and intelligent transportation applications.

